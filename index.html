<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CashFlix ⚡ — India's Highest Paying Reward Network</title><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#070b14;--bg2:#0a0f1e;--card:#0f1628;--card2:#151d30;--blue:#3b82f6;--cyan:#22d3ee;--yellow:#f59e0b;--green:#10b981;--text:#f1f5f9;--muted:#64748b;--border:#1a2540}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.grid-bg::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 20s linear infinite}

.grid-bg::after{content:'';position:absolute;top:-300px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(59,130,246,.13) 0%,rgba(34,211,238,.06) 40%,transparent 70%);animation:pulseGlow 4s ease-in-out infinite alternate}
@keyframes pulseGlow{from{opacity:.7;transform:translateX(-50%) scale(1)}to{opacity:1;transform:translateX(-50%) scale(1.08)}}
.particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.particle{position:absolute;border-radius:50%;opacity:0;animation:float var(--dur,8s) var(--delay,0s) infinite linear}

.menu-item:hover{background:var(--card);border-color:var(--border)}
.menu-tg{background:var(--yellow);color:#000;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;font-family:'Manrope',sans-serif;cursor:pointer;width:100%;margin-top:auto;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:all .2s}
.menu-tg:hover{filter:brightness(1.1);transform:translateY(-1px)}
.stay-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px}
.stay-box .tag{font-size:10px;font-weight:800;color:var(--yellow);letter-spacing:1.5px;margin-bottom:6px}
.stay-box p{font-size:12px;color:var(--muted);line-height:1.6}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;backdrop-filter:blur(4px)}
.overlay.open{display:block}
.hero{position:relative;z-index:1;padding:120px 20px 60px;text-align:center;max-width:480px;margin:0 auto}

.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}

.section{padding:60px 20px;max-width:480px;margin:0 auto;position:relative;z-index:1}
.sec-title{font-size:30px;font-weight:900;text-align:center;margin-bottom:8px}

.cc-btn:hover{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;border-color:transparent;box-shadow:0 4px 20px rgba(59,130,246,.4);transform:translateY(-1px)}
.rev-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px;transition:all .3s}
